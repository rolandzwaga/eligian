name: CI

on:
  push:
    branches:
      - main
  # SECURITY: keep this as `pull_request`, never `pull_request_target`.
  # `pull_request` runs fork PRs in the fork's context with a read-only token and
  # an isolated (merge-ref-scoped) cache, so a malicious PR cannot poison the
  # dependency cache that `main` restores. `pull_request_target` would run
  # untrusted PR code in the base repo's context and reintroduce that attack.
  pull_request:
    branches:
      - main

# Least privilege by default: jobs only get read access unless they opt into more.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes and avoid stale results.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      # Required to checkout the code
      contents: read
      # Required to put a comment into the pull-request
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Don't leave the GITHUB_TOKEN in .git/config; this job never pushes.
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint code (Biome)
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Type check
        run: pnpm run typecheck

      - name: Run tests with coverage
        run: pnpm run test:coverage:ci

      - name: Report Coverage
        # Run even if tests fail to see coverage of failing tests
        if: always()
        uses: davelosert/vitest-coverage-report-action@02f3c2e641286b7fa308cd3e430783103ce6103b # v2.12.0
        with:
          # Show coverage only for changed files to reduce noise
          file-coverage-mode: changes
          name: 'Coverage Report'
          json-summary-path: 'packages/language/coverage/coverage-summary.json'
          json-final-path: 'packages/language/coverage/coverage-final.json'
          vite-config-path: 'packages/language/vitest.config.ts'
