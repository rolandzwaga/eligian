# Dependabot configuration for the Eligian pnpm workspace.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Two ecosystems are tracked:
#   1. npm        -> JS/TS deps. pnpm uses the "npm" ecosystem; pointing at "/"
#                    reads pnpm-lock.yaml and covers root + all packages/* workspaces.
#   2. github-actions -> the actions pinned in .github/workflows/ci.yml.

version: 2
updates:
  # ---------------------------------------------------------------------------
  # JavaScript / TypeScript dependencies (pnpm workspace)
  # ---------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    versioning-strategy: "increase"
    labels:
      - "dependencies"
    commit-message:
      # Matches the repo's conventional "chore(deps): ..." style.
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    # Give freshly published releases a few days to surface regressions before
    # Dependabot opens a PR for them.
    cooldown:
      default-days: 5
      semver-major-days: 7
    # The langium toolchain must move in lockstep: langium-cli generates code
    # (src/generated/ast.ts) against the langium *runtime* type definitions, and
    # the runtime is capped at 4.2.x by typir-langium@0.3.3 (peer `langium ~4.2.0`).
    # A lone langium-cli 4.3.x bump emits `optional: true` into the AST metadata,
    # which the 4.2.x `PropertyMetaData` type rejects -> the build breaks.
    # Block langium-cli minor/major bumps until typir-langium supports langium
    # 4.3.x; remove this once the whole toolchain can move together.
    ignore:
      - dependency-name: "langium-cli"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"
    groups:
      # Keep the langium toolchain in a single PR so the runtime, code generator,
      # and Typir integration are always reviewed and bumped together. Listed
      # first so these win over the dependency-type groups below.
      langium-toolchain:
        applies-to: version-updates
        patterns:
          - "langium"
          - "langium-cli"
          - "typir"
          - "typir-langium"
      # Bundle low-risk minor/patch bumps so they land as a single PR.
      production-minor-patch:
        applies-to: version-updates
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-minor-patch:
        applies-to: version-updates
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    # Major bumps are intentionally left ungrouped so each gets its own PR and
    # review (e.g. effect, eligius, vitest, biome, langium toolchain).

  # ---------------------------------------------------------------------------
  # GitHub Actions used by the CI workflow
  # ---------------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "*"
